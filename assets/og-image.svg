<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e80f1f" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#e80f1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#e80f1f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <!-- BG layers -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#redGlow)"/>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- ========= TOP HUD - 2 badges, fits content ========= -->
  <g transform="translate(360, 60)">
    <rect width="200" height="44" rx="3" fill="#e80f1f"/>
    <text x="100" y="30" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="800" fill="#fff" letter-spacing="3">★ LV.3 UNLOCKED ★</text>
  </g>

  <g transform="translate(640, 60)">
    <rect width="200" height="44" rx="3" fill="rgba(232,15,31,0.15)" stroke="#e80f1f" stroke-width="2"/>
    <rect x="16" y="16" width="11" height="11" fill="#e80f1f">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="115" y="30" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="800" fill="#e80f1f" letter-spacing="2">-30% · DO 31.05</text>
  </g>

  <!-- ========= PIXEL BALLOONS ========= -->
  <!-- Balon 1: czerwony lewa góra -->
  <g transform="translate(110, 160) rotate(-10)">
    <rect x="16" y="0" width="16" height="8" fill="#e80f1f"/>
    <rect x="8" y="8" width="32" height="8" fill="#e80f1f"/>
    <rect x="0" y="16" width="48" height="16" fill="#e80f1f"/>
    <rect x="8" y="32" width="32" height="8" fill="#e80f1f"/>
    <rect x="16" y="40" width="16" height="8" fill="#e80f1f"/>
    <rect x="14" y="10" width="6" height="6" fill="rgba(255,255,255,0.55)"/>
    <rect x="20" y="48" width="8" height="4" fill="#9a0610"/>
    <path d="M 24 52 L 22 80 L 28 110 L 22 145" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none"/>
  </g>

  <!-- Balon 2: biały lewa dół -->
  <g transform="translate(70, 380) rotate(8)">
    <rect x="13" y="0" width="13" height="6" fill="#fdfbf7"/>
    <rect x="6" y="6" width="26" height="6" fill="#fdfbf7"/>
    <rect x="0" y="12" width="38" height="13" fill="#fdfbf7"/>
    <rect x="6" y="25" width="26" height="6" fill="#fdfbf7"/>
    <rect x="13" y="31" width="13" height="6" fill="#fdfbf7"/>
    <rect x="11" y="9" width="5" height="5" fill="rgba(255,255,255,0.85)"/>
    <rect x="16" y="37" width="6" height="3" fill="#c9c0b1"/>
    <path d="M 19 40 L 15 65 L 22 85 L 15 105" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none"/>
  </g>

  <!-- Balon 3: kremowy prawa góra -->
  <g transform="translate(1040, 170) rotate(12)">
    <rect x="16" y="0" width="16" height="8" fill="#faf7f2"/>
    <rect x="8" y="8" width="32" height="8" fill="#faf7f2"/>
    <rect x="0" y="16" width="48" height="16" fill="#faf7f2"/>
    <rect x="8" y="32" width="32" height="8" fill="#faf7f2"/>
    <rect x="16" y="40" width="16" height="8" fill="#faf7f2"/>
    <rect x="14" y="10" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
    <rect x="20" y="48" width="8" height="4" fill="#c9c0b1"/>
    <path d="M 24 52 L 28 80 L 22 110 L 28 145" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  </g>

  <!-- Balon 4: czerwony prawa dół -->
  <g transform="translate(1080, 380) rotate(-12)">
    <rect x="13" y="0" width="13" height="6" fill="#e80f1f"/>
    <rect x="6" y="6" width="26" height="6" fill="#e80f1f"/>
    <rect x="0" y="12" width="38" height="13" fill="#e80f1f"/>
    <rect x="6" y="25" width="26" height="6" fill="#e80f1f"/>
    <rect x="13" y="31" width="13" height="6" fill="#e80f1f"/>
    <rect x="11" y="9" width="5" height="5" fill="rgba(255,255,255,0.55)"/>
    <rect x="16" y="37" width="6" height="3" fill="#9a0610"/>
    <path d="M 19 40 L 22 65 L 16 90 L 22 115" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  </g>

  <!-- ========= MAIN TITLE BLOCK - stacked, centered ========= -->
  <!-- Big "3" -->
  <text x="600" y="320" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="220" font-weight="900" fill="#e80f1f" letter-spacing="-6">3</text>

  <!-- "URODZINY" -->
  <text x="600" y="395" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="900" fill="#fff" letter-spacing="6">URODZINY</text>

  <!-- "GAMEBOOK" -->
  <text x="600" y="445" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="#e80f1f" letter-spacing="14">★ GAMEBOOK ★</text>

  <!-- ========= BOTTOM PILLS ========= -->
  <g transform="translate(600, 510)">
    <g transform="translate(-300, 0)">
      <rect width="190" height="44" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="95" y="29" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#fff" letter-spacing="1">3 BOXY · -30%</text>
    </g>
    <g transform="translate(-95, 0)">
      <rect width="190" height="44" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="95" y="29" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#fff" letter-spacing="1">+ 2 GRATISY</text>
    </g>
    <g transform="translate(110, 0)">
      <rect width="190" height="44" rx="3" fill="#e80f1f"/>
      <text x="95" y="29" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="800" fill="#fff" letter-spacing="1">DO 31 MAJA</text>
    </g>
  </g>

  <!-- ========= URL FOOTER ========= -->
  <text x="600" y="595" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e80f1f" letter-spacing="3">▸ urodziny.gamebook.pl</text>
</svg>
